<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#334155"/>
    </marker>
    <marker id="a2o" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#d97706"/>
    </marker>
    <marker id="a2i" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4f46e5"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="760" fill="#ffffff"/>
  <rect x="0" y="0" width="8" height="760" fill="#b91c1c"/>
  <text x="56" y="56" font-size="30" font-weight="bold" fill="#0f172a">Why a non-linear generative model?</text>
  <text x="58" y="88" font-size="17" fill="#475569">Linear baselines propagate technical artifacts; the VAE learns an artifact-aware, state-dependent aging manifold.</text>
  <!-- LANE 1: linear -->
  <rect x="56" y="116" width="1088" height="248" rx="14" fill="#fffbeb" stroke="#d97706" stroke-width="1.8"/>
  <text x="80" y="148" font-size="19" font-weight="bold" fill="#b45309">Linear baselines &#160;&#183;&#160; PCA / ALS</text>
  <!-- young cloud -->
  <ellipse cx="170" cy="258" rx="58" ry="44" fill="#ffffff" stroke="#94a3b8" stroke-width="1.4"/>
  <circle cx="150" cy="246" r="5" fill="#0d9488"/>
  <circle cx="178" cy="238" r="5" fill="#0d9488"/>
  <circle cx="190" cy="266" r="5" fill="#0d9488"/>
  <circle cx="158" cy="276" r="5" fill="#0d9488"/>
  <circle cx="176" cy="258" r="5" fill="#0d9488"/>
  <text x="170" y="324" font-size="13" fill="#0f172a" text-anchor="middle">Young cells</text>
  <!-- parallel rigid arrows -->
  <path d="M232 238 L356 238" stroke="#d97706" stroke-width="1.8" marker-end="url(#a2o)"/>
  <path d="M232 258 L356 258" stroke="#d97706" stroke-width="1.8" marker-end="url(#a2o)"/>
  <path d="M232 278 L356 278" stroke="#d97706" stroke-width="1.8" marker-end="url(#a2o)"/>
  <text x="294" y="226" font-size="12.5" font-weight="bold" fill="#b45309" text-anchor="middle">+ fixed g</text>
  <!-- old cloud (identical shape, shifted) -->
  <ellipse cx="430" cy="258" rx="58" ry="44" fill="#ffffff" stroke="#94a3b8" stroke-width="1.4"/>
  <circle cx="410" cy="246" r="5" fill="#a78bfa"/>
  <circle cx="438" cy="238" r="5" fill="#a78bfa"/>
  <circle cx="450" cy="266" r="5" fill="#a78bfa"/>
  <circle cx="418" cy="276" r="5" fill="#a78bfa"/>
  <circle cx="436" cy="258" r="5" fill="#a78bfa"/>
  <text x="430" y="324" font-size="13" fill="#0f172a" text-anchor="middle">rigidly shifted (same spread)</text>
  <text x="556" y="178" font-size="14" fill="#9a3412">&#10007;&#160; One fixed vector added to every cell (shift-invariant)</text>
  <text x="556" y="210" font-size="14" fill="#9a3412">&#10007;&#160; Propagates zero-inflation &amp; dropout artifacts forward</text>
  <text x="556" y="242" font-size="14" fill="#9a3412">&#10007;&#160; Collapses cell-to-cell heterogeneity (mode collapse)</text>
  <text x="556" y="274" font-size="14" fill="#9a3412">&#10007;&#160; Forward / reverse are algebraic mirrors &#8212; no state info</text>
  <text x="556" y="306" font-size="14" fill="#9a3412">&#10007;&#160; High R&#178; / R<tspan font-size="10" dy="3">ggc</tspan><tspan dy="-3"> can be artifact, not aging biology</tspan></text>
  <!-- LANE 2: VAE -->
  <rect x="56" y="396" width="1088" height="248" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.8"/>
  <text x="80" y="428" font-size="19" font-weight="bold" fill="#4338ca">VAE &#160;&#183;&#160; GeroEngine</text>
  <!-- young cloud -->
  <ellipse cx="150" cy="536" rx="52" ry="42" fill="#ffffff" stroke="#94a3b8" stroke-width="1.4"/>
  <circle cx="132" cy="524" r="5" fill="#0d9488"/>
  <circle cx="158" cy="518" r="5" fill="#0d9488"/>
  <circle cx="168" cy="544" r="5" fill="#0d9488"/>
  <circle cx="138" cy="552" r="5" fill="#0d9488"/>
  <text x="150" y="596" font-size="12.5" fill="#0f172a" text-anchor="middle">Young cells</text>
  <!-- encoder -->
  <polygon points="214,504 268,520 268,552 214,568" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.4"/>
  <text x="241" y="540" font-size="11" fill="#4338ca" text-anchor="middle">En</text>
  <!-- latent + g -->
  <circle cx="318" cy="536" r="18" fill="#c7d2fe" stroke="#4f46e5" stroke-width="1.4"/>
  <text x="318" y="540" font-size="11" fill="#3730a3" text-anchor="middle">z</text>
  <path d="M268 536 L300 536" stroke="#4f46e5" stroke-width="1.8" marker-end="url(#a2i)"/>
  <path d="M336 536 L372 536" stroke="#4f46e5" stroke-width="1.8" marker-end="url(#a2i)"/>
  <text x="354" y="524" font-size="12" font-weight="bold" fill="#4338ca" text-anchor="middle">+ g</text>
  <!-- decoder -->
  <polygon points="378,520 432,504 432,568 378,552" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.4"/>
  <text x="405" y="540" font-size="11" fill="#4338ca" text-anchor="middle">De</text>
  <path d="M432 536 L452 536" stroke="#4f46e5" stroke-width="1.8" marker-end="url(#a2i)"/>
  <!-- old cloud, heterogeneous curved -->
  <path d="M462 536 C 470 500, 520 502, 528 524 C 556 520, 566 556, 540 566 C 536 590, 486 588, 478 566 C 458 566, 452 544, 462 536 Z" fill="#ffffff" stroke="#94a3b8" stroke-width="1.4"/>
  <circle cx="486" cy="528" r="5" fill="#7c3aed"/>
  <circle cx="512" cy="522" r="5" fill="#7c3aed"/>
  <circle cx="524" cy="548" r="5" fill="#7c3aed"/>
  <circle cx="496" cy="560" r="5" fill="#7c3aed"/>
  <circle cx="470" cy="544" r="5" fill="#7c3aed"/>
  <text x="506" y="606" font-size="12.5" fill="#0f172a" text-anchor="middle">heterogeneity preserved</text>
  <text x="596" y="458" font-size="14" fill="#166534">&#10003;&#160; Non-linear encoder&#8211;decoder bottleneck</text>
  <text x="596" y="490" font-size="14" fill="#166534">&#10003;&#160; Reduces technical-artifact carryover (low MMD "vs. artifact-reduced ref")</text>
  <text x="596" y="522" font-size="14" fill="#166534">&#10003;&#160; Preserves age-associated heterogeneity (no collapse)</text>
  <text x="596" y="554" font-size="14" fill="#166534">&#10003;&#160; Captures true directionality (higher R<tspan font-size="10" dy="3">shift</tspan><tspan dy="-3">)</tspan></text>
  <text x="596" y="586" font-size="14" fill="#166534">&#10003;&#160; State-dependent: forward &#8800; reverse mirror &#8594; diagnostic readout</text>
  <!-- bottom verdict strip -->
  <rect x="56" y="668" width="350" height="72" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.3"/>
  <text x="231" y="698" font-size="14" font-weight="bold" fill="#166534" text-anchor="middle">Directional accuracy</text>
  <text x="173" y="722" font-size="13" fill="#15803d" text-anchor="start">R<tspan font-size="10" dy="3">shift</tspan><tspan dy="-3"> higher for VAE</tspan></text>
  <rect x="425" y="668" width="350" height="72" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.3"/>
  <text x="600" y="698" font-size="14" font-weight="bold" fill="#166534" text-anchor="middle">Manifold alignment</text>
  <text x="600" y="722" font-size="13" fill="#15803d" text-anchor="middle">MMD "vs. artifact-reduced ref" lower</text>
  <rect x="794" y="668" width="350" height="72" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.3"/>
  <text x="969" y="698" font-size="14" font-weight="bold" fill="#166534" text-anchor="middle">Heterogeneity</text>
  <text x="969" y="722" font-size="13" fill="#15803d" text-anchor="middle">shift variance kept (ALS &#8776; 0)</text>
</svg>